<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Everywhere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 4px;
      color: #fff;
    }
    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #aaa;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16162a;
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #d4a574; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .toggle-row label { margin-bottom: 0; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #d4a574; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #d4a574;
      color: #1a1a2e;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #c49464; }
    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 12px;
      color: #6c6;
      min-height: 16px;
    }
    .disclaimer {
      text-align: center;
      font-size: 10px;
      color: #555;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>Claude Everywhere</h1>
  <p class="subtitle">Claude on every page.</p>

  <label for="apiKey">Anthropic API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />

  <div class="toggle-row">
    <label>Show floating button</label>
    <div class="toggle">
      <input type="checkbox" id="showOverlay" checked />
      <span class="slider"></span>
    </div>
  </div>

  <div class="toggle-row">
    <label>Context-aware mode</label>
    <div class="toggle">
      <input type="checkbox" id="contextMode" checked />
      <span class="slider"></span>
    </div>
  </div>

  <button id="saveBtn">Save Settings</button>
  <p class="status" id="status"></p>
  <p class="disclaimer">Not affiliated with Anthropic.</p>

  <script src="popup.js"></script>
</body>
</html>
